groups:
  - name: fastapi_alerts
    rules:
      - alert: HighErrorRate
        expr: rate(fastapi_errors_total[5m]) > 5
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "High error rate detected"
          description: "Error rate is above 5 per minute"

      - alert: HighRequestLatency
        expr: fastapi_request_latency_seconds_mean > 2
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "High request latency"
          description: "Average request latency is above 2 seconds"

      - alert: HighMemoryUsage
        expr: system_memory_usage_percent > 90
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High memory usage"
          description: "Memory usage is above 90%"

      - alert: HighCPUUsage
        expr: system_cpu_usage_percent > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage"
          description: "CPU usage is above 80%"

      - alert: HighDiskUsage
        expr: system_disk_usage_percent > 85
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High disk usage"
          description: "Disk usage is above 85%"

      - alert: ChatRequestFailure
        expr: rate(rag_chat_requests_total{status="failed"}[5m]) / rate(rag_chat_requests_total[5m]) > 0.1
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "High chat request failure rate"
          description: "Chat request failure rate is above 10%"

      - alert: DocumentRetrievalFailure
        expr: rate(rag_document_retrieval_total{status="failed"}[5m]) / rate(rag_document_retrieval_total[5m]) > 0.2
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "High document retrieval failure rate"
          description: "Document retrieval failure rate is above 20%"

      - alert: LLMCallFailure
        expr: rate(rag_llm_calls_total{status="failed"}[5m]) / rate(rag_llm_calls_total[5m]) > 0.1
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "High LLM call failure rate"
          description: "LLM call failure rate is above 10%"

      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service is down"
          description: "{{ $labels.job }} is not responding"

      - alert: HighVectorDBQueryLatency
        expr: vector_db_query_latency_seconds_mean > 1
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "High vector DB query latency"
          description: "Average vector DB query latency is above 1 second"
